services:
  mysql:
    image: mysql:8.0
    container_name: questparty-db
    environment:
      MYSQL_DATABASE: questparty
      MYSQL_USER: questparty
      MYSQL_PASSWORD: questparty
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - questparty_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: questparty-api
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: questparty
      DB_USER: questparty
      DB_PASSWORD: questparty
      JWT_SECRET: questparty-dev-secret-key-min-32-chars-long!!
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"

volumes:
  questparty_mysql:
